<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>
</head>
<body>

    <h2>Feedback Form</h2>

    <form>

        <!-- Full Name -->
        <label for="fullname">Full Name:</label><br>
        <input 
            type="text" 
            id="fullname" 
            name="fullname"
            placeholder="Enter your full name"
            minlength="3"
            required>
        <br><br>

        <!-- Email Address -->
        <label for="email">Email Address:</label><br> 
        <input 
            type="email" 
            id="email" 
            name="email"
            placeholder="Enter your email"
            required>
        <br><br>

        <!-- Rating Section -->
        <p>Rating:</p>

        <input type="radio" id="very-satisfied" name="rating" required>
        <label for="very-satisfied">Very Satisfied</label><br>

        <input type="radio" id="satisfied" name="rating">
        <label for="satisfied">Satisfied</label><br>

        <input type="radio" id="neutral" name="rating">
        <label for="neutral">Neutral</label><br>

        <input type="radio" id="unsatisfied" name="rating">
        <label for="unsatisfied">Unsatisfied</label><br><br>

        <!-- Interests Section -->
        <p>Interests:</p>

        <input type="checkbox" id="web-dev" name="interest">
        <label for="web-dev">Web Development</label><br>

        <input type="checkbox" id="mobile-dev" name="interest">
        <label for="mobile-dev">Mobile Development</label><br>

        <input type="checkbox" id="ai-ml" name="interest">
        <label for="ai-ml">AI & Machine Learning</label><br><br>

        <!-- Country Selection -->
        <label for="country">Select Your Country:</label><br>

        <select id="country" name="country" required>
            <option value="">--Choose Country--</option>
            <option value="nepal">Nepal</option>
            <option value="usa">USA</option>
            <option value="canada">Canada</option>
        </select>
        <br><br>

        <!-- Feedback Message -->
        <label for="message">Write your feedback here:</label><br>

        <textarea> 
            id="message"
            name="message"
            rows="5"
            cols="40"
            placeholder="Write your feedback here"
            maxlength="300"
            required>
        </textarea>
        <br><br>

        <!-- Submit Button -->
        <button type="submit">Submit</button>

    </form>

</body>
</html>
