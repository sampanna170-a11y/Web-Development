<h2>Square Pattern</h2>

<script>
function printSquare(n) {

    for (let i = 1; i <= n; i++) {

        let row = "";

        for (let j = 1; j <= n; j++) {
            row += "*";
        }

        console.log(row);
    }

}

printSquare(5);
</script>
