<!DOCTYPE html>
<html>
<head>
    <title>Multiplication Table</title>
</head>
<body>

<h2>Multiplication Table Generator</h2>

<script>
function multiplicationTable(number) {

    for (let i = 1; i <= 10; i++) {
        console.log(number + " x " + i + " = " + (number * i));
    }

}

multiplicationTable(5);
</script>

</body>
</html>
