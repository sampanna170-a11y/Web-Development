<!DOCTYPE html>
<html>
<head>
    <title>Even or Odd Checker</title>
</head>
<body>

<h2>Even or Odd Checker</h2>

<script>
function checkEvenOdd(number) {
    if (number % 2 === 0) {
        console.log(number + " is an even number.");
    } else {
        console.log(number + " is an odd number.");
    }
}

checkEvenOdd(7);
checkEvenOdd(8);
</script>

</body>
</html>
