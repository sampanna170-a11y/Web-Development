<!DOCTYPE html>
<html>
<head>
    <title>Right Angled Triangle</title>
</head>
<body>

<h2>Right Angled Triangle</h2>

<script>
function printTriangle(n) {

    for (let i = 1; i <= n; i++) {

        let row = "";

        for (let j = 1; j <= i; j++) {
            row += "*";
        }

        console.log(row);
    }

}

printTriangle(5);
</script>

</body>
</html>
