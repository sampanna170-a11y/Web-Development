<!DOCTYPE html>
<html>
<head>
    <title>FizzBuzz Challenge</title>
</head>
<body>

<h2>FizzBuzz Challenge</h2>

<script>
function fizzBuzz() {

    for (let i = 1; i <= 20; i++) {

        if (i % 3 === 0 && i % 5 === 0) {
            console.log("FizzBuzz");
        }
        else if (i % 3 === 0) {
            console.log("Fizz");
        }
        else if (i % 5 === 0) {
            console.log("Buzz");
        }
        else {
            console.log(i);
        }

    }

}

fizzBuzz(50);
</script>

</body>
</html>
